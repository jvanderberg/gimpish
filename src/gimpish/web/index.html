<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gimpish — live preview</title>
  <style>
    :root { --bg:#16171b; --panel:#1e2026; --line:#2c2f37; --txt:#d7dae0; --dim:#8b909b; --accent:#5b8cff; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:var(--bg); color:var(--txt); height:100vh; overflow:hidden; }
    #root { height:100vh; }
    .app { display:flex; height:100vh; }
    .stage { flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { display:flex; align-items:center; gap:12px; padding:10px 16px;
              border-bottom:1px solid var(--line); background:var(--panel); }
    .topbar h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.3px; }
    .topbar .meta { color:var(--dim); font-size:12px; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
    .ok { background:#46c46a; } .off { background:#c44; }
    .btn { margin-left:auto; background:#2a2d35; border:1px solid var(--line); color:var(--txt);
            padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
    .btn:hover { border-color:var(--accent); }
    .canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:24px;
                   overflow:auto;
                   background-image:
                     linear-gradient(45deg,#202228 25%,transparent 25%),
                     linear-gradient(-45deg,#202228 25%,transparent 25%),
                     linear-gradient(45deg,transparent 75%,#202228 75%),
                     linear-gradient(-45deg,transparent 75%,#202228 75%);
                   background-size:24px 24px;
                   background-position:0 0,0 12px,12px -12px,-12px 0; }
    .frame { position:relative; box-shadow:0 8px 40px rgba(0,0,0,.5); border-radius:2px; }
    .frame > img { display:block; width:100%; height:100%; border-radius:2px; }
    .frame img.ghost { position:absolute; inset:0; pointer-events:none;
                       will-change:transform; }
    .frame svg { position:absolute; inset:0; width:100%; height:100%;
                 touch-action:none; cursor:default; }
    .frame svg .box { fill:none; stroke:var(--accent); }
    .frame svg .hit { fill:transparent; cursor:move; }
    .frame svg .handle { fill:var(--accent); stroke:#fff; cursor:grab; }
    .frame svg .handle-line { stroke:var(--accent); }
    .frame svg .corner { fill:#fff; stroke:var(--accent); cursor:nwse-resize; }
    .layer { cursor:pointer; }
    .layer.sel { background:#243056; }
    .layer.sel .swatch { border-color:var(--accent); }
    .xform { padding:8px 16px 14px; border-top:1px solid var(--line); color:var(--dim);
             font-size:11px; font-family:ui-monospace,monospace; }
    .xform b { color:var(--txt); font-weight:600; }
    .hint { color:var(--dim); font-size:11px; padding:0 16px 12px; }
    .panel { width:320px; background:var(--panel); border-left:1px solid var(--line);
             display:flex; flex-direction:column; }
    .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim);
                margin:0; padding:14px 16px 8px; }
    .layers { overflow:auto; flex:1; }
    .layer { display:flex; align-items:center; gap:10px; padding:10px 16px;
             border-bottom:1px solid var(--line); }
    .layer.hidden { opacity:.45; }
    .swatch { width:34px; height:34px; border-radius:5px; flex:none; display:flex;
              align-items:center; justify-content:center; font-size:15px;
              background:#2a2d35; border:1px solid var(--line); }
    .layer .info { min-width:0; flex:1; }
    .layer .name { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .layer .sub { color:var(--dim); font-size:11px; white-space:nowrap; overflow:hidden;
                  text-overflow:ellipsis; }
    .tag { display:inline-block; background:#2a2d35; border:1px solid var(--line); border-radius:4px;
           padding:0 5px; margin-right:5px; font-size:10px; color:var(--dim); }
    .empty { color:var(--dim); padding:24px 16px; }
    .err { color:#ff8080; padding:14px 16px; font-family:ui-monospace,monospace; font-size:12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useCallback, useRef, useLayoutEffect }
      from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(React.createElement);

    const ICONS = { image: "🖼", shape: "◆", gradient: "▧", arrow: "➜", text: "T" };

    function shapeIcon(l) {
      if (l.type === "shape") return l.shape === "ellipse" ? "⬭" : "▭";
      if (l.type === "gradient") return (l.gradient?.kind === "radial") ? "◎" : "▧";
      return ICONS[l.type] || "?";
    }
    function subtitle(l) {
      if (l.type === "image") {
        const s = l.transform?.scale ?? 1;
        return `${l.source ?? "?"}  ·  ×${(+s).toPrecision(3)}${l.mask ? "  ·  mask:" + l.mask.kind : ""}`;
      }
      if (l.type === "shape") return `${l.shape}  ${l.fill ?? ""}${l.stroke ? " / " + l.stroke : ""}`;
      if (l.type === "gradient") return `${l.gradient?.kind ?? "linear"} gradient`;
      if (l.type === "arrow") {
        const a = l.arrow ?? {};
        return `(${a.from_x}, ${a.from_y}) → (${a.to_x}, ${a.to_y})`;
      }
      if (l.type === "text") {
        const t = l.text ?? {};
        const content = (t.content ?? "").replaceAll("\\n", " ");
        return `${content}  ·  ${t.font ?? "sans-serif"} ${t.size ?? ""}`;
      }
      return "";
    }

    function Layer({ l, sel, onSelect }) {
      const cls = "layer" + (l.visible ? "" : " hidden") + (sel ? " sel" : "");
      return html`<div class=${cls} onClick=${() => onSelect(l.id)}>
        <div class="swatch">${shapeIcon(l)}</div>
        <div class="info">
          <div class="name">${l.name || l.id}</div>
          <div class="sub">
            <span class="tag">${l.type}</span>
            ${l.blend !== "normal" ? html`<span class="tag">${l.blend}</span>` : null}
            ${l.opacity < 1 ? html`<span class="tag">${Math.round(l.opacity * 100)}%</span>` : null}
            ${subtitle(l)}
          </div>
        </div>
      </div>`;
    }

    // ---- interactive-canvas geometry helpers ----------------------------------
    const DEG = 180 / Math.PI;
    let _uid = 0;
    const uid = () => ++_uid;   // stable per-gesture tag for ghost/preview URLs

    function containBox(availW, availH, aspect) {
      if (availW <= 0 || availH <= 0) return { w: 0, h: 0 };
      return (availW / availH > aspect)
        ? { w: availH * aspect, h: availH }
        : { w: availW, h: availW / aspect };
    }

    // clientX/clientY -> canvas-space coords via the overlay SVG's own matrix.
    function clientToCanvas(svg, clientX, clientY) {
      const p = svg.createSVGPoint();
      p.x = clientX; p.y = clientY;
      const m = svg.getScreenCTM();
      if (!m) return { x: 0, y: 0 };
      const q = p.matrixTransform(m.inverse());
      return { x: q.x, y: q.y };
    }

    // Is canvas point `pt` inside rotated box `b`? Rotate pt into the box frame.
    function insideBox(b, pt) {
      const a = -b.rotation / DEG, c = Math.cos(a), s = Math.sin(a);
      const dx = pt.x - b.cx, dy = pt.y - b.cy;
      const lx = dx * c - dy * s, ly = dx * s + dy * c;
      return Math.abs(lx) <= b.w / 2 && Math.abs(ly) <= b.h / 2;
    }

    // Topmost box (last in paint order) containing the point.
    function hitTest(boxes, pt) {
      for (let i = boxes.length - 1; i >= 0; i--)
        if (insideBox(boxes[i], pt)) return boxes[i].id;
      return null;
    }

    // Rotate a canvas point about a box's pivot by the box's rotation.
    function rotAboutPivot(b, x, y) {
      const a = b.rotation / DEG, c = Math.cos(a), s = Math.sin(a);
      const dx = x - b.pivotx, dy = y - b.pivoty;
      return { x: b.pivotx + dx * c - dy * s, y: b.pivoty + dx * s + dy * c };
    }

    // Rotation-handle position (canvas coords): above the box's top-center in the
    // unrotated frame, then rotated about the box's pivot to match the content.
    function handlePos(b, off) {
      return rotAboutPivot(b, b.cx, b.cy - b.h / 2 - off);
    }

    // The box's four corners in canvas coords (rotated about its pivot).
    function corners(b) {
      const hw = b.w / 2, hh = b.h / 2;
      return [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]]
        .map(([ox, oy]) => rotAboutPivot(b, b.cx + ox, b.cy + oy));
    }

    function App() {
      const [scene, setScene] = useState(null);
      const [geom, setGeom] = useState({ boxes: [] });
      const [err, setErr] = useState(null);
      const [ts, setTs] = useState(Date.now());
      const [live, setLive] = useState(false);
      const [sel, setSel] = useState(null);
      const [drag, setDrag] = useState(null);   // active manipulation, or null
      const [avail, setAvail] = useState({ w: 0, h: 0 });

      const wrapRef = useRef(null);
      const svgRef = useRef(null);

      const refresh = useCallback(async () => {
        try {
          const [rs, rg] = await Promise.all([
            fetch("/api/scene"), fetch("/api/geometry"),
          ]);
          const s = await rs.json();
          const g = await rg.json();
          if (s.error) { setErr(s.error); }
          else { setScene(s); setErr(null); }
          if (!g.error) setGeom(g);
        } catch (e) { setErr(String(e)); }
        setTs(Date.now());
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      useEffect(() => {
        let ws, retry;
        const connect = () => {
          ws = new WebSocket(`ws://${location.host}/ws`);
          ws.onopen = () => setLive(true);
          ws.onmessage = () => refresh();
          ws.onclose = () => { setLive(false); retry = setTimeout(connect, 1000); };
          ws.onerror = () => ws.close();
        };
        connect();
        return () => { clearTimeout(retry); ws && ws.close(); };
      }, [refresh]);

      // Track available canvas area so we can size the frame to the contain-box.
      useLayoutEffect(() => {
        const el = wrapRef.current;
        if (!el) return;
        const ro = new ResizeObserver(([e]) => {
          const r = e.contentRect;
          setAvail({ w: r.width, h: r.height });
        });
        ro.observe(el);
        return () => ro.disconnect();
      }, []);

      const cv = scene?.canvas;
      const CW = cv?.width ?? 1, CH = cv?.height ?? 1;
      const frame = containBox(avail.w, avail.h, CW / CH);
      const k = frame.w > 0 ? CW / frame.w : 1;   // canvas units per CSS px
      const boxes = geom.boxes ?? [];

      // The box for the selected layer, with live drag values applied.
      let selBox = boxes.find((b) => b.id === sel) || null;
      if (selBox && drag && drag.id === sel) {
        if (drag.mode === "move") {
          const dx = drag.cur.cx - drag.orig.cx, dy = drag.cur.cy - drag.orig.cy;
          selBox = { ...selBox, cx: drag.cur.cx, cy: drag.cur.cy,
                     pivotx: selBox.pivotx + dx, pivoty: selBox.pivoty + dy };
        } else if (drag.mode === "scale") {
          const f = drag.cur.scale;
          selBox = { ...selBox, w: selBox.w * f, h: selBox.h * f,
                     cx: drag.pivotx + (selBox.cx - drag.pivotx) * f,
                     cy: drag.pivoty + (selBox.cy - drag.pivoty) * f };
        } else {
          selBox = { ...selBox, rotation: drag.cur.rotation };
        }
      }

      // Live ghost: while dragging, the preview drops the dragged layer and a
      // sprite of it floats on top, moved/rotated with a pure CSS transform.
      const previewSrc = drag
        ? `/api/preview.png?hide=${drag.id}&ts=${drag.stamp}`
        : `/api/preview.png?ts=${ts}`;
      const ghostSrc = sel ? `/api/layer/${sel}/sprite.png?ts=${ts}` : null;
      let ghostStyle = { display: "none" };
      if (drag && selBox) {
        if (drag.mode === "move") {
          const gx = (drag.cur.cx - drag.orig.cx) / k, gy = (drag.cur.cy - drag.orig.cy) / k;
          ghostStyle = { display: "block", transform: `translate(${gx}px, ${gy}px)` };
        } else if (drag.mode === "scale") {
          ghostStyle = { display: "block",
                         transformOrigin: `${drag.pivotx / k}px ${drag.pivoty / k}px`,
                         transform: `scale(${drag.cur.scale})` };
        } else {
          const d = drag.cur.rotation - drag.orig.rotation;
          ghostStyle = { display: "block",
                         transformOrigin: `${drag.pivotx / k}px ${drag.pivoty / k}px`,
                         transform: `rotate(${d}deg)` };
        }
      }

      const post = useCallback(async (id, body) => {
        try {
          await fetch(`/api/layer/${id}/transform`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
        } catch (e) { setErr(String(e)); }
        // The save trips the watcher -> ws reload -> refresh(); no manual refetch.
      }, []);

      // Commit a finished gesture as a translation/rotation delta (works for
      // image/text/arrow uniformly on the server).
      const commit = useCallback((d) => {
        if (d.mode === "rotate") post(d.id, { drot: d.cur.rotation - d.orig.rotation });
        else if (d.mode === "scale") post(d.id, { scale: d.cur.scale });
        else post(d.id, { dx: d.cur.cx - d.orig.cx, dy: d.cur.cy - d.orig.cy });
      }, [post]);

      const startDrag = (svg, e, b, pt) => {
        svg.setPointerCapture(e.pointerId);
        const stamp = uid();
        if (b.rotate) {
          const hp = handlePos(b, 26 * k);
          if (Math.hypot(pt.x - hp.x, pt.y - hp.y) <= 12 * k) {
            const start = Math.atan2(pt.y - b.pivoty, pt.x - b.pivotx) * DEG;
            setDrag({ mode: "rotate", id: b.id, stamp, pivotx: b.pivotx,
                      pivoty: b.pivoty, startAngle: start,
                      orig: { rotation: b.rotation }, cur: { rotation: b.rotation } });
            return;
          }
        }
        if (b.scale) {
          const c = corners(b).find((p) => Math.hypot(pt.x - p.x, pt.y - p.y) <= 11 * k);
          if (c) {
            const d0 = Math.max(Math.hypot(c.x - b.pivotx, c.y - b.pivoty), 1e-3);
            setDrag({ mode: "scale", id: b.id, stamp, pivotx: b.pivotx,
                      pivoty: b.pivoty, d0, orig: { scale: 1 }, cur: { scale: 1 } });
            return;
          }
        }
        if (b.move) {
          setDrag({ mode: "move", id: b.id, stamp, start: pt,
                    orig: { cx: b.cx, cy: b.cy }, cur: { cx: b.cx, cy: b.cy } });
        }
      };

      const onDown = useCallback((e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const pt = clientToCanvas(svg, e.clientX, e.clientY);
        // A selection (from the layer list or a prior click) owns the drag: grab
        // anywhere to move it, or grab its top handle to rotate. Canvas clicks
        // never re-hit-test or deselect while something is selected.
        if (selBox) { startDrag(svg, e, selBox, pt); return; }
        // Nothing selected yet: click a layer to select and start manipulating it.
        const id = hitTest(boxes, pt);
        if (id) {
          const b = boxes.find((x) => x.id === id);
          setSel(id);
          startDrag(svg, e, b, pt);
        }
      }, [boxes, selBox, k]);

      const onMove = useCallback((e) => {
        const svg = svgRef.current;
        if (!svg) return;
        const pt = clientToCanvas(svg, e.clientX, e.clientY);
        setDrag((d) => {
          if (!d) return d;
          if (d.mode === "move") {
            return { ...d, cur: { cx: d.orig.cx + (pt.x - d.start.x),
                                  cy: d.orig.cy + (pt.y - d.start.y) } };
          }
          if (d.mode === "scale") {
            const dist = Math.hypot(pt.x - d.pivotx, pt.y - d.pivoty);
            return { ...d, cur: { scale: Math.max(0.05, dist / d.d0) } };
          }
          const ang = Math.atan2(pt.y - d.pivoty, pt.x - d.pivotx) * DEG;
          let rot = d.orig.rotation + (ang - d.startAngle);
          rot = Math.round(rot * 10) / 10;
          return { ...d, cur: { rotation: rot } };
        });
      }, []);

      const onUp = useCallback((e) => {
        const svg = svgRef.current;
        if (svg && svg.hasPointerCapture?.(e.pointerId))
          svg.releasePointerCapture(e.pointerId);
        setDrag((d) => { if (d) commit(d); return null; });
      }, [commit]);

      // Arrow-key nudge for the selection (1px, Shift = 10px). Esc deselects.
      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") { setSel(null); return; }
          if (!selBox || drag) return;
          const step = e.shiftKey ? 10 : 1;
          const d = { ArrowLeft: [-step, 0], ArrowRight: [step, 0],
                      ArrowUp: [0, -step], ArrowDown: [0, step] }[e.key];
          if (!d) return;
          e.preventDefault();
          post(selBox.id, { dx: d[0], dy: d[1] });
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [selBox, drag, post]);

      const layers = scene ? [...scene.layers].reverse() : [];
      const selLayer = scene?.layers.find((l) => l.id === sel);

      function readout(l) {
        if (!l) return null;
        if (l.type === "image") {
          const t = l.transform || {};
          return html`x <b>${(+t.x).toFixed(1)}</b>  y <b>${(+t.y).toFixed(1)}</b>
            scale <b>${(+t.scale).toPrecision(3)}</b>  rot <b>${(+t.rotation).toFixed(1)}°</b>`;
        }
        if (l.type === "text") {
          const t = l.text || {};
          return html`x <b>${(+t.x).toFixed(1)}</b>  y <b>${(+t.y).toFixed(1)}</b>
            rot <b>${(+(t.rotation || 0)).toFixed(1)}°</b>`;
        }
        if (l.type === "arrow") {
          const a = l.arrow || {};
          return html`(<b>${(+a.from_x).toFixed(0)}</b>, <b>${(+a.from_y).toFixed(0)}</b>)
            → (<b>${(+a.to_x).toFixed(0)}</b>, <b>${(+a.to_y).toFixed(0)}</b>)`;
        }
        if (l.type === "shape") {
          const r = l.rect || {};
          return html`x <b>${(+r.x).toFixed(1)}</b>  y <b>${(+r.y).toFixed(1)}</b>
            rot <b>${(+(r.rotation || 0)).toFixed(1)}°</b>`;
        }
        if (l.type === "gradient") {
          const g = l.gradient || {};
          return g.kind === "radial"
            ? html`radial · drag to move center`
            : html`linear · <b>${(+(g.angle || 0)).toFixed(1)}°</b> · handle rotates`;
        }
        return html`<span>${l.type}</span>`;
      }

      return html`<div class="app">
        <div class="stage">
          <div class="topbar">
            <h1>gimpish</h1>
            <span class="meta">
              <span class=${"dot " + (live ? "ok" : "off")}></span>
              ${live ? "live" : "reconnecting…"}
              ${cv ? `  ·  ${CW}×${CH}  ·  bg ${cv.background}` : ""}
            </span>
            <button class="btn" onClick=${refresh}>Refresh</button>
          </div>
          <div class="canvas-wrap" ref=${wrapRef}>
            <div class="frame" style=${{ width: frame.w + "px", height: frame.h + "px" }}>
              <img src=${previewSrc} alt="scene preview" draggable=${false} />
              ${ghostSrc ? html`<img class="ghost" src=${ghostSrc} draggable=${false}
                                     style=${ghostStyle} />` : null}
              <svg ref=${svgRef} viewBox=${`0 0 ${CW} ${CH}`}
                   style=${{ cursor: selBox && selBox.move ? "move" : "default" }}
                   onPointerDown=${onDown} onPointerMove=${onMove}
                   onPointerUp=${onUp} onPointerCancel=${onUp}>
                ${selBox ? html`
                  <g transform=${`rotate(${selBox.rotation} ${selBox.pivotx} ${selBox.pivoty})`}>
                    <rect class="hit" x=${selBox.cx - selBox.w / 2} y=${selBox.cy - selBox.h / 2}
                          width=${selBox.w} height=${selBox.h} />
                    <rect class="box" x=${selBox.cx - selBox.w / 2} y=${selBox.cy - selBox.h / 2}
                          width=${selBox.w} height=${selBox.h} stroke-width=${1.5 * k} />
                  </g>
                  ${selBox.scale ? corners(selBox).map((p, i) => html`
                    <rect key=${i} class="corner" x=${p.x - 5 * k} y=${p.y - 5 * k}
                          width=${10 * k} height=${10 * k} stroke-width=${1.5 * k} />
                  `) : null}
                  ${selBox.rotate ? html`
                    <line class="handle-line" x1=${selBox.cx} y1=${selBox.cy}
                          x2=${handlePos(selBox, 26 * k).x} y2=${handlePos(selBox, 26 * k).y}
                          stroke-width=${1.5 * k} />
                    <circle class="handle" cx=${handlePos(selBox, 26 * k).x}
                            cy=${handlePos(selBox, 26 * k).y} r=${6 * k}
                            stroke-width=${1.5 * k} />
                  ` : null}
                ` : null}
              </svg>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>Layers ${scene ? `(${scene.layers.length})` : ""}</h2>
          ${err ? html`<div class="err">${err}</div>` : null}
          <div class="layers">
            ${layers.length === 0 && !err ? html`<div class="empty">No layers yet.</div>` : null}
            ${layers.map((l) => html`<${Layer} key=${l.id} l=${l}
                sel=${l.id === sel} onSelect=${setSel} />`)}
          </div>
          ${selLayer ? html`<div class="xform">
            <b>${selLayer.name || selLayer.id}</b> — ${selLayer.type}<br/>
            ${readout(selLayer)}
          </div>` : null}
          <div class="hint">Click a layer to select · drag to move · top handle rotates · arrows nudge · Esc clears. Radial gradients move their center; linear gradients rotate their angle.</div>
        </div>
      </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
