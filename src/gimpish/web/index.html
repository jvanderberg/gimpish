<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gimpish — live preview</title>
  <style>
    :root { --bg:#16171b; --panel:#1e2026; --line:#2c2f37; --txt:#d7dae0; --dim:#8b909b; --accent:#5b8cff; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
           background:var(--bg); color:var(--txt); height:100vh; overflow:hidden; }
    #root { height:100vh; }
    .app { display:flex; height:100vh; }
    .stage { flex:1; display:flex; flex-direction:column; min-width:0; }
    .topbar { display:flex; align-items:center; gap:12px; padding:10px 16px;
              border-bottom:1px solid var(--line); background:var(--panel); }
    .topbar h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.3px; }
    .topbar .meta { color:var(--dim); font-size:12px; }
    .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px; }
    .ok { background:#46c46a; } .off { background:#c44; }
    .btn { margin-left:auto; background:#2a2d35; border:1px solid var(--line); color:var(--txt);
            padding:5px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
    .btn:hover { border-color:var(--accent); }
    .canvas-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:24px;
                   overflow:auto;
                   background-image:
                     linear-gradient(45deg,#202228 25%,transparent 25%),
                     linear-gradient(-45deg,#202228 25%,transparent 25%),
                     linear-gradient(45deg,transparent 75%,#202228 75%),
                     linear-gradient(-45deg,transparent 75%,#202228 75%);
                   background-size:24px 24px;
                   background-position:0 0,0 12px,12px -12px,-12px 0; }
    .canvas-wrap img { max-width:100%; max-height:100%; object-fit:contain;
                       box-shadow:0 8px 40px rgba(0,0,0,.5); border-radius:2px; }
    .panel { width:320px; background:var(--panel); border-left:1px solid var(--line);
             display:flex; flex-direction:column; }
    .panel h2 { font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim);
                margin:0; padding:14px 16px 8px; }
    .layers { overflow:auto; flex:1; }
    .layer { display:flex; align-items:center; gap:10px; padding:10px 16px;
             border-bottom:1px solid var(--line); }
    .layer.hidden { opacity:.45; }
    .swatch { width:34px; height:34px; border-radius:5px; flex:none; display:flex;
              align-items:center; justify-content:center; font-size:15px;
              background:#2a2d35; border:1px solid var(--line); }
    .layer .info { min-width:0; flex:1; }
    .layer .name { font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .layer .sub { color:var(--dim); font-size:11px; white-space:nowrap; overflow:hidden;
                  text-overflow:ellipsis; }
    .tag { display:inline-block; background:#2a2d35; border:1px solid var(--line); border-radius:4px;
           padding:0 5px; margin-right:5px; font-size:10px; color:var(--dim); }
    .empty { color:var(--dim); padding:24px 16px; }
    .err { color:#ff8080; padding:14px 16px; font-family:ui-monospace,monospace; font-size:12px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useCallback } from "https://esm.sh/react@18.3.1";
    import { createRoot } from "https://esm.sh/react-dom@18.3.1/client";
    import htm from "https://esm.sh/htm@3.1.1";
    const html = htm.bind(React.createElement);

    const ICONS = { image: "🖼", shape: "◆", gradient: "▧" };

    function shapeIcon(l) {
      if (l.type === "shape") return l.shape === "ellipse" ? "⬭" : "▭";
      if (l.type === "gradient") return (l.gradient?.kind === "radial") ? "◎" : "▧";
      return ICONS[l.type] || "?";
    }
    function subtitle(l) {
      if (l.type === "image") {
        const s = l.transform?.scale ?? 1;
        return `${l.source ?? "?"}  ·  ×${(+s).toPrecision(3)}${l.mask ? "  ·  mask:" + l.mask.kind : ""}`;
      }
      if (l.type === "shape") return `${l.shape}  ${l.fill ?? ""}${l.stroke ? " / " + l.stroke : ""}`;
      if (l.type === "gradient") return `${l.gradient?.kind ?? "linear"} gradient`;
      return "";
    }

    function Layer({ l }) {
      return html`<div class=${"layer" + (l.visible ? "" : " hidden")}>
        <div class="swatch">${shapeIcon(l)}</div>
        <div class="info">
          <div class="name">${l.name || l.id}</div>
          <div class="sub">
            <span class="tag">${l.type}</span>
            ${l.blend !== "normal" ? html`<span class="tag">${l.blend}</span>` : null}
            ${l.opacity < 1 ? html`<span class="tag">${Math.round(l.opacity * 100)}%</span>` : null}
            ${subtitle(l)}
          </div>
        </div>
      </div>`;
    }

    function App() {
      const [scene, setScene] = useState(null);
      const [err, setErr] = useState(null);
      const [ts, setTs] = useState(Date.now());
      const [live, setLive] = useState(false);

      const refresh = useCallback(async () => {
        try {
          const r = await fetch("/api/scene");
          const data = await r.json();
          if (data.error) { setErr(data.error); }
          else { setScene(data); setErr(null); }
        } catch (e) { setErr(String(e)); }
        setTs(Date.now());
      }, []);

      useEffect(() => { refresh(); }, [refresh]);

      useEffect(() => {
        let ws, retry;
        const connect = () => {
          ws = new WebSocket(`ws://${location.host}/ws`);
          ws.onopen = () => setLive(true);
          ws.onmessage = () => refresh();
          ws.onclose = () => { setLive(false); retry = setTimeout(connect, 1000); };
          ws.onerror = () => ws.close();
        };
        connect();
        return () => { clearTimeout(retry); ws && ws.close(); };
      }, [refresh]);

      const layers = scene ? [...scene.layers].reverse() : [];
      const cv = scene?.canvas;

      return html`<div class="app">
        <div class="stage">
          <div class="topbar">
            <h1>gimpish</h1>
            <span class="meta">
              <span class=${"dot " + (live ? "ok" : "off")}></span>
              ${live ? "live" : "reconnecting…"}
              ${cv ? `  ·  ${cv.width}×${cv.height}  ·  bg ${cv.background}` : ""}
            </span>
            <button class="btn" onClick=${refresh}>Refresh</button>
          </div>
          <div class="canvas-wrap">
            <img src=${"/api/preview.png?ts=" + ts} alt="scene preview" />
          </div>
        </div>
        <div class="panel">
          <h2>Layers ${scene ? `(${scene.layers.length})` : ""}</h2>
          ${err ? html`<div class="err">${err}</div>` : null}
          <div class="layers">
            ${layers.length === 0 && !err ? html`<div class="empty">No layers yet.</div>` : null}
            ${layers.map((l) => html`<${Layer} key=${l.id} l=${l} />`)}
          </div>
        </div>
      </div>`;
    }

    createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
